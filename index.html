<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
     <!-- HEADER-->
      <header class="header">
        <div class="logo">
            <span class="logo-icon">◑</span>
            <span class="logo-text">Character Counter</span>
        </div>
        <button class="settings-btn">⚙</button>
      </header>

      <!--MAIN-->
      <class="main">

        <!-- HERO -->
         <section class="hero">
            <h1 class="hero-title">Analyze your text <br> in real-time.</h1>
         </section>

        <!-- TEXTAREA -->
         <section class="textarea-section">
            <textarea class="text-input" placeholder="Start typing or paste your text here..." ></textarea>
         </section>

        <!--CONTROLES-->
        <section class="controls">
            <div class="checkboxes">
                <label class="checkbox-label">
                    <input type="checkbox" /> Exclude spaces
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" /> Set Character Limit
                </label>
            </div>
            <span class="reading-time">Approx. reading time: &lt;1 minute</span>
        </section>

        <!--CARDS-->
        <section class="cards">
            <div class="card card-purple">
                <span class="card-number">278</span>
                <span class="card-label">Total Characters</span>
            </div>
            <div class="card card-orange">
                <span class="card-number">39</span>
                <span class="card-label">Word Count</span>
            </div>
            <div class="card card-coral">
                <span class="card-number">04</span>
                <span class="card-label">Sentence Count</span>
            </div>
        </section>

        <!--LETTER DENSITY-->
        <section class="density">
            <h2 class="density-title">Letter Density</h2>
            <div class="density-list">
                <div class="density-row">
                    <span class="density-letter">E</span>
                    <div class="density-bar-wrap">
                        <div class="density-bar" style="width: 60%"></div>
                    </div>
                    <span class="density-count">40 (16.06%)</span>
                </div>
                <div class="density-row">
                    <span class="density-letter">I</span>
              <div class="density-bar-wrap">
                <div class="density-bar" style="width: 45%"></div>
              </div>
              <span class="density-count">29 (11.65%)</span>
            </div>
            <div class="density-row">
              <span class="density-letter">T</span>
              <div class="density-bar-wrap">
                <div class="density-bar" style="width: 43%"></div>
              </div>
              <span class="density-count">28 (11.24%)</span>
            </div>
            <div class="density-row">
              <span class="density-letter">O</span>
              <div class="density-bar-wrap">
                <div class="density-bar" style="width: 33%"></div>
              </div>
              <span class="density-count">22 (8.84%)</span>
            </div>
            <div class="density-row">
              <span class="density-letter">N</span>
              <div class="density-bar-wrap">
                <div class="density-bar" style="width: 30%"></div>
              </div>
              <span class="density-count">21 (8.43%)</span>
            </div>
          </div>
          <button class="see-more">See more ∨</button>
                </div>
            </div>
        </section>

        </main>
    </div>
    
</body>
</html>
